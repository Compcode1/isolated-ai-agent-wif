name: Deploy Zero-Trust Azure Mesh

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  validate-and-write:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Codebase
        uses: actions/checkout@v4

      - name: Authenticate with Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID || vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID || vars.AZURE_TENANT_ID }}
          subscription-id: "Azure Subscription 1"

      - name: Upload Test Payload to Vault Logs
        uses: azure/CLI@v2
        with:
          inlineScript: |
            echo "Automated validation payload text." > connection-test.txt
            az storage blob upload \
              --account-name ${{ vars.AZURE_STORAGE_ACCOUNT }} \
              --container-name vault-logs \
              --name connection-test.txt \
              --file connection-test.txt \
              --auth-mode login
